<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – BookMySlot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card" style="max-width:500px;">

    <div class="login-logo">
      <div class="icon"><i class="bi bi-calendar-check-fill"></i></div>
      <div>
        <div class="brand">BookMySlot</div>
        <div class="tagline">Faculty Registration</div>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} mb-3" data-auto-dismiss>{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <h2 style="font-size:1.4rem;color:var(--navy);margin-bottom:.25rem;">Create Account</h2>
    <p class="text-muted small mb-4">Register to book seminar and webinar halls</p>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:0 1rem;">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-control" name="name" placeholder="Dr. Jane Smith" required>
        </div>
        <div class="form-group">
          <label class="form-label">Department *</label>
          <input type="text" class="form-control" name="department" placeholder="Computer Science" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address *</label>
        <input type="email" class="form-control" name="email" placeholder="jane.smith@university.edu" required>
      </div>

      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" name="phone" placeholder="9XXXXXXXXX">
      </div>

      <div class="form-group">
        <label class="form-label">Password *</label>
        <input type="password" class="form-control" name="password" placeholder="Min. 8 characters" required minlength="8">
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2" style="padding:.7rem;">
        <i class="bi bi-person-plus"></i> Create Account
      </button>
    </form>

    <div style="text-align:center;margin-top:1.2rem;font-size:.875rem;">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--navy);font-weight:600;">Sign In</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
